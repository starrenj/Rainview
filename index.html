<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RainView - Gardener's Rain Pattern Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        :root {
            /* Warm Flat 2.0 Color Palette */
            --bg-color: #FFF3E0;
            --surface-color: #FFFFFF;
            --primary-color: #E65100;
            --secondary-color: #F57C00;
            --accent-color: #FFB74D;
            --text-main: #3E2723;
            --text-muted: #5D4037;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(230, 81, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border-top: 4px solid var(--secondary-color);
            display: flex;
            flex-direction: column;
        }

        .card.full-width {
            grid-column: 1 / -1;
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 8px 12px;
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            background-color: #fff;
            color: var(--text-main);
            font-size: 1rem;
        }

        button {
            background-color: var(--secondary-color);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-color);
        }

        #map {
            height: 400px;
            border-radius: 8px;
            z-index: 1;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 243, 224, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: var(--primary-color);
            z-index: 9999;
            flex-direction: column;
        }

        .spinner {
            border: 6px solid var(--accent-color);
            border-top: 6px solid var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 800px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Loading Data Files...</div>
    </div>

    <header>
        <h1>RainView</h1>
        <p>Understand local rain patterns to guide your gardening decisions.</p>
    </header>

    <div class="container">
        
        <div class="card full-width">
            <h2>Total Regional Rain Over Time</h2>
            <div class="chart-container">
                <canvas id="totalRainChart"></canvas>
            </div>
        </div>

        <div class="card full-width">
            <h2>Gauge Locations & Monthly Rain Map</h2>
            <div class="controls">
                <label for="mapMonthSelect">Select Month:</label>
                <select id="mapMonthSelect">
                    <option value="all">All Time Locations</option>
                    </select>
                <span style="font-size: 0.9em; color: var(--text-muted);">(Bigger/Darker circles = More Rain)</span>
            </div>
            <div id="map"></div>
        </div>

        <div class="card full-width">
            <h2>Gauge Specific Rain History</h2>
            <div class="controls">
                <label for="gaugeSelect">Select a Gauge:</label>
                <select id="gaugeSelect">
                    </select>
            </div>
            <div class="chart-container">
                <canvas id="singleGaugeChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Global Data Stores
        let gauges = {};
        let revisions = {};
        let readings = [];
        
        let map;
        let mapLayerGroup;
        
        let totalRainChartInstance;
        let singleGaugeChartInstance;

        // Warm color palette for charts
        const chartColors = {
            main: 'rgba(230, 81, 0, 0.8)',
            border: 'rgba(230, 81, 0, 1)',
            bg: 'rgba(255, 183, 77, 0.2)'
        };

        async function init() {
            try {
                updateLoadingStatus("Loading gauges.csv...");
                const gaugesRaw = await fetchCSV('gauges.csv');
                gaugesRaw.data.forEach(r => {
                    if (r.gauge_id) gauges[r.gauge_id] = { name: r.name, status: r.status };
                });

                updateLoadingStatus("Loading gauge_revisions.csv...");
                const revRaw = await fetchCSV('gauge_revisions.csv');
                revRaw.data.forEach(r => {
                    if (r.gauge_revision_id) {
                        revisions[r.gauge_revision_id] = {
                            lat: parseFloat(r.latitude),
                            lon: parseFloat(r.longitude),
                            gauge_id: r.gauge_id
                        };
                    }
                });

                updateLoadingStatus("Loading monthly_readings.csv...");
                const readRaw = await fetchCSV('monthly_readings.csv');
                readRaw.data.forEach(r => {
                    if (r.reading_date && r.rain_amount) {
                        readings.push({
                            gauge_id: r.gauge_id,
                            revision_id: r.gauge_revision_id,
                            date: r.reading_date.substring(0, 7), // YYYY-MM
                            amount: parseFloat(r.rain_amount)
                        });
                    }
                });

                document.getElementById('loading').style.display = 'none';
                buildDashboard();

            } catch (err) {
                console.error(err);
                document.getElementById('loading-text').innerText = "Error loading data. Make sure CSV files are hosted alongside this HTML file.";
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        function fetchCSV(filename) {
            return new Promise((resolve, reject) => {
                Papa.parse(filename, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: resolve,
                    error: reject
                });
            });
        }

        function updateLoadingStatus(text) {
            document.getElementById('loading-text').innerText = text;
        }

        function buildDashboard() {
            initMap();
            processTotalRain();
            populateMapMonthDropdown();
            populateGaugeDropdown();
            setupEventListeners();
        }

        // --- 1. Total Rain by Month Over Time ---
        function processTotalRain() {
            const monthlyTotals = {};
            readings.forEach(r => {
                if (!monthlyTotals[r.date]) monthlyTotals[r.date] = 0;
                monthlyTotals[r.date] += r.amount;
            });

            const sortedMonths = Object.keys(monthlyTotals).sort();
            const data = sortedMonths.map(m => monthlyTotals[m]);

            const ctx = document.getElementById('totalRainChart').getContext('2d');
            totalRainChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedMonths,
                    datasets: [{
                        label: 'Total Regional Rain (inches)',
                        data: data,
                        backgroundColor: chartColors.main,
                        borderColor: chartColors.border,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // --- 2. Map Generation ---
        function initMap() {
            // Default center based on general dataset bounds (Tucson area rough estimate)
            map = L.map('map').setView([32.2226, -110.9747], 9);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
            
            mapLayerGroup = L.layerGroup().addTo(map);
            updateMap('all');
        }

        function populateMapMonthDropdown() {
            const months = [...new Set(readings.map(r => r.date))].sort().reverse();
            const select = document.getElementById('mapMonthSelect');
            months.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                select.appendChild(opt);
            });
        }

        function updateMap(selectedMonth) {
            mapLayerGroup.clearLayers();

            if (selectedMonth === 'all') {
                // Show all distinct gauge locations
                const plotted = new Set();
                Object.values(revisions).forEach(rev => {
                    const key = `${rev.lat},${rev.lon}`;
                    if (!plotted.has(key) && !isNaN(rev.lat)) {
                        plotted.add(key);
                        L.circleMarker([rev.lat, rev.lon], {
                            radius: 4,
                            fillColor: '#FFB74D',
                            color: '#E65100',
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.6
                        }).bindPopup(`Gauge ID: ${rev.gauge_id}`).addTo(mapLayerGroup);
                    }
                });
            } else {
                // Show rain amount chloropleth-style points for specific month
                const monthReadings = readings.filter(r => r.date === selectedMonth);
                monthReadings.forEach(r => {
                    const rev = revisions[r.revision_id];
                    if (rev && !isNaN(rev.lat) && r.amount > 0) {
                        const radius = Math.max(4, Math.min(r.amount * 5, 25)); // Scale size
                        const opacity = Math.min(0.4 + (r.amount * 0.1), 0.9); // Scale color intensity
                        
                        L.circleMarker([rev.lat, rev.lon], {
                            radius: radius,
                            fillColor: '#E65100',
                            color: '#bf360c',
                            weight: 1,
                            opacity: 1,
                            fillOpacity: opacity
                        }).bindPopup(`<b>Gauge ${rev.gauge_id}</b><br>Rain: ${r.amount} in`).addTo(mapLayerGroup);
                    }
                });
            }
        }

        // --- 3. Single Gauge View ---
        function populateGaugeDropdown() {
            // Find top gauges with the most readings to populate dropdown intelligently
            const gaugeCounts = {};
            readings.forEach(r => {
                gaugeCounts[r.gauge_id] = (gaugeCounts[r.gauge_id] || 0) + 1;
            });

            const sortedGauges = Object.keys(gaugeCounts).sort((a, b) => gaugeCounts[b] - gaugeCounts[a]).slice(0, 100); // Top 100
            
            const select = document.getElementById('gaugeSelect');
            sortedGauges.forEach(gid => {
                const opt = document.createElement('option');
                opt.value = gid;
                const name = gauges[gid] ? gauges[gid].name : 'Unknown';
                opt.textContent = `Gauge ${gid} (${name}) - ${gaugeCounts[gid]} readings`;
                select.appendChild(opt);
            });

            if (sortedGauges.length > 0) {
                updateSingleGaugeChart(sortedGauges[0]);
            }
        }

        function updateSingleGaugeChart(gaugeId) {
            const gaugeReadings = readings.filter(r => r.gauge_id == gaugeId).sort((a, b) => a.date.localeCompare(b.date));
            const labels = gaugeReadings.map(r => r.date);
            const data = gaugeReadings.map(r => r.amount);

            if (singleGaugeChartInstance) {
                singleGaugeChartInstance.destroy();
            }

            const ctx = document.getElementById('singleGaugeChart').getContext('2d');
            singleGaugeChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Rain (inches) for Gauge ${gaugeId}`,
                        data: data,
                        backgroundColor: chartColors.bg,
                        borderColor: chartColors.border,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: chartColors.main
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            document.getElementById('mapMonthSelect').addEventListener('change', (e) => {
                updateMap(e.target.value);
            });

            document.getElementById('gaugeSelect').addEventListener('change', (e) => {
                updateSingleGaugeChart(e.target.value);
            });
        }

        // Start app
        window.onload = init;
    </script>
</body>
</html>
